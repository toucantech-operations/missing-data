<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipedrive Missing Data Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --radius:6px;--radius-lg:14px;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Jost",system-ui,sans-serif;
  --mono:"JetBrains Mono",monospace;
  --transition:200ms ease;
  --bg:#041C18;--surface:#072820;--surface2:#021210;
  --border:#0C4030;--border-strong:#186850;
  --text:#D8FFE8;--muted:#50B888;
  --accent:#C8C000;--accent-fg:#101000;--glow:#40E8C0;
  --tag-bg:#0A3828;
  --danger-bg:#201800;--danger-border:#604800;--danger-text:#E8C040;
  --success-bg:#041C10;--success-border:#107040;--success-text:#40E090;
  --star:#C8C000;--star-bg:#1A1800;--star-border:#403800;
}
html{font-size:16px}
body{font-family:var(--sans);font-weight:400;min-height:100vh;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.shell{max-width:1000px;margin:0 auto;padding:32px 28px 80px}

/* Header */
header{padding:32px 36px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:24px}
header h1{font-family:var(--serif);font-size:clamp(28px,4vw,42px);font-weight:300;line-height:1.06;letter-spacing:-0.01em;color:var(--text)}
header h1 em{font-style:italic;font-weight:300;opacity:0.45}
header p{margin-top:8px;font-size:13px;font-weight:300;color:var(--muted);line-height:1.8}

/* Tabs */
.tabs{display:flex;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tab-btn{display:flex;align-items:center;gap:9px;padding:12px 20px;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:0.04em;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color var(--transition);margin-bottom:-1px}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.tab-orb{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--glow);transition:box-shadow var(--transition)}
.tab-btn.active .tab-orb{box-shadow:0 0 10px var(--glow)}
.tab-soon{font-size:10px;opacity:0.4;font-family:var(--mono);margin-left:2px}

/* Filter bar */
.filter-bar{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:20px}
.filter-group{display:flex;flex-direction:column;gap:5px;min-width:150px}
.filter-group label{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)}

/* Multi-select dropdown */
.multi-select{position:relative}
.multi-select-trigger{
  min-height:40px;padding:6px 12px;font-family:var(--sans);font-size:13px;font-weight:300;
  color:var(--text);background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;
  justify-content:space-between;gap:8px;transition:border-color var(--transition);
  user-select:none;min-width:150px;
}
.multi-select-trigger:hover{border-color:var(--border-strong)}
.multi-select-trigger.open{border-color:var(--border-strong)}
.multi-select-trigger-text{flex:1;font-size:12px;line-height:1.4}
.multi-select-arrow{font-size:10px;opacity:0.5;flex-shrink:0;transition:transform var(--transition)}
.multi-select-trigger.open .multi-select-arrow{transform:rotate(180deg)}
.multi-select-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;z-index:100;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius);min-width:100%;box-shadow:0 8px 24px rgba(0,0,0,0.4);
  overflow:hidden;
}
.multi-select-dropdown.hidden{display:none}
.multi-option{
  display:flex;align-items:center;gap:10px;padding:9px 14px;
  font-size:13px;color:var(--text);cursor:pointer;font-family:var(--sans);
  transition:background var(--transition);white-space:nowrap;
}
.multi-option:hover{background:var(--tag-bg)}
.multi-option.selected{color:var(--accent)}
.multi-checkbox{
  width:14px;height:14px;border:1px solid var(--border-strong);border-radius:3px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;background:var(--surface2);
}
.multi-option.selected .multi-checkbox{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}

/* Star filter toggle */
.star-toggle{
  height:40px;padding:0 16px;font-family:var(--mono);font-size:11px;
  color:var(--muted);background:none;border:1px solid var(--border);
  border-radius:var(--radius);cursor:pointer;white-space:nowrap;
  transition:border-color var(--transition),color var(--transition),background var(--transition);
  display:flex;align-items:center;gap:6px;align-self:flex-end;
}
.star-toggle:hover{border-color:var(--border-strong);color:var(--text)}
.star-toggle.active{border-color:var(--star);color:var(--star);background:var(--star-bg)}

.filter-clear{height:40px;padding:0 16px;font-family:var(--mono);font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;white-space:nowrap;transition:border-color var(--transition),color var(--transition);align-self:flex-end}
.filter-clear:hover{border-color:var(--border-strong);color:var(--text)}

/* Summary */
.summary-grid{display:grid;grid-template-columns:200px 1fr 260px;gap:12px;margin-bottom:16px}
.summary-outer{background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius-lg);padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.summary-block{}
.summary-label{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.summary-big{font-family:var(--serif);font-size:52px;font-weight:300;line-height:1;color:var(--text)}
.summary-big-star{font-family:var(--serif);font-size:52px;font-weight:300;line-height:1;color:var(--star)}
.summary-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:var(--mono)}
.summary-divider{height:1px;background:var(--border);margin:0 -24px}



/* Right side: field stat tiles */
.summary-right{display:flex;flex-direction:column;gap:12px}
.summary-fields-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.field-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;cursor:pointer;transition:border-color var(--transition),background var(--transition);user-select:none}
.field-stat:hover{border-color:var(--border-strong);background:var(--tag-bg)}
.field-stat.active{border-color:var(--accent);background:var(--tag-bg)}
.field-stat-num{font-family:var(--serif);font-size:22px;font-weight:300;line-height:1;color:var(--text);margin-bottom:2px}
.field-stat-label{font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);font-family:var(--mono);line-height:1.3}

/* Results */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
.results-count{font-family:var(--mono);font-size:11px;color:var(--muted)}
.results-list{display:flex;flex-direction:column;gap:8px}
.result-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;animation:slide-in 200ms ease both}
@keyframes slide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.result-item.is-star{border-color:var(--star-border)}
.result-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface2);gap:10px;flex-wrap:wrap}
.result-name{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:0}
.result-name .star-badge{color:var(--star);font-size:12px;margin-right:4px}
.result-meta{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.stage-pill{background:var(--tag-bg);border:1px solid var(--border);border-radius:100px;padding:2px 10px;color:var(--text);font-size:10px;font-family:var(--mono)}
.result-link{font-family:var(--mono);font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:0.04em;white-space:nowrap}
.result-link:hover{color:var(--accent)}
.missing-fields{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px}
.missing-pill{display:inline-flex;align-items:center;gap:5px;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:100px;padding:3px 10px;font-family:var(--mono);font-size:11px;color:var(--danger-text)}
.missing-dot{width:4px;height:4px;border-radius:50%;background:var(--danger-text);opacity:0.6}

/* States */
.state-block{padding:52px 0;text-align:center}
.state-block p{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:14px}
.loader{display:flex;align-items:center;justify-content:center;gap:6px}
.loader-dot{width:7px;height:7px;border-radius:50%;background:var(--glow);animation:bounce 1.2s infinite ease;box-shadow:0 0 8px var(--glow)}
.loader-dot:nth-child(2){animation-delay:0.15s}.loader-dot:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,80%,100%{transform:scale(0.4);opacity:0.2}40%{transform:scale(1);opacity:1}}
.all-good-block{display:flex;align-items:center;gap:12px;padding:18px 22px;background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--radius);color:var(--success-text);font-size:14px;font-weight:500}
.error-block{padding:18px 22px;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius);color:var(--danger-text);font-size:14px}
.error-block strong{font-weight:500;display:block;margin-bottom:4px}
.coming-soon{text-align:center;padding:60px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.coming-soon-icon{font-size:36px;margin-bottom:16px}
.coming-soon p{font-size:13px;color:var(--muted);font-family:var(--mono);margin-top:8px}
.coming-soon-title{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
.pie-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:10px}
.pie-title{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
.pie-wrap{position:relative;width:100%;aspect-ratio:1;max-width:200px;margin:0 auto}
.pie-wrap canvas{width:100%!important;height:100%!important}
.pie-legend{display:flex;flex-direction:column;gap:4px}
.pie-legend-item{display:flex;align-items:center;gap:7px;font-size:11px;font-family:var(--mono);color:var(--muted)}
.pie-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;display:flex;justify-content:space-between;opacity:0.5}
@media(max-width:700px){.summary-grid{grid-template-columns:1fr}.filter-bar{flex-direction:column}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<div class="shell">
  <header>
    <h1>Pipedrive <em>Missing Data</em></h1>
    <p>Open deals in Main Pipeline with incomplete fields.</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('deals')" id="tab-deals">
      <span class="tab-orb"></span>Deals
    </button>
    <button class="tab-btn" onclick="switchTab('leads')" id="tab-leads">
      <span class="tab-orb" style="opacity:0.35"></span>Leads<span class="tab-soon">coming soon</span>
    </button>
  </div>

  <div id="panel-deals">
    <div class="filter-bar">
      <div class="filter-group">
        <label>Owner</label>
        <div class="multi-select" id="ms-owner">
          <div class="multi-select-trigger" onclick="toggleDropdown('ms-owner')">
            <span class="multi-select-trigger-text" id="ms-owner-label">All owners</span>
            <span class="multi-select-arrow">&#9660;</span>
          </div>
          <div class="multi-select-dropdown hidden" id="ms-owner-dropdown"></div>
        </div>
      </div>
      <div class="filter-group">
        <label>Stage</label>
        <div class="multi-select" id="ms-stage">
          <div class="multi-select-trigger" onclick="toggleDropdown('ms-stage')">
            <span class="multi-select-trigger-text" id="ms-stage-label">All stages</span>
            <span class="multi-select-arrow">&#9660;</span>
          </div>
          <div class="multi-select-dropdown hidden" id="ms-stage-dropdown"></div>
        </div>
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button class="star-toggle" id="star-toggle-btn" onclick="toggleStarFilter()" style="width:100%">&#9733; STAR deals only</button>
      </div>
      <div style="display:flex;align-items:flex-end;">
        <button class="filter-clear" onclick="clearFilters()" style="width:100%">Clear filters</button>
      </div>
    </div>

    <div id="pd-summary"></div>
    <div id="pd-results"></div>
  </div>

  <div id="panel-leads" style="display:none">
    <div class="coming-soon">
      <div class="coming-soon-icon">🧩</div>
      <div class="coming-soon-title">Coming soon</div>
      <p>Leads missing data checks will be built here.</p>
    </div>
  </div>

  <footer>
    <span>Pipedrive Missing Data Dashboard</span>
    <span>Credentials stored in this file only</span>
  </footer>
</div>
<script>
var PD_TOKEN    = '61d3d6dd5ff041a05ffc62b30b5ea05442382c93';
var PD_PIPELINE = 11;

var STAGES = {
  54:'Qualified', 55:'Demo Booked', 58:'Demo Done',
  56:'S Proposal Made (Slow)', 59:'F Proposal Made (Fast)',
  57:'Negotiation', 60:'Awaiting Contract'
};
var OWNER_OPTIONS = ['Amy','Fady','Matt','Myron','Merryn','Other'];
var STAGE_OPTIONS = Object.keys(STAGES).map(function(id){return {id:String(id),name:STAGES[id]};});

var CHECKS = [
  {label:'Size',            key:'55316164ecec27deb69e66cdd1ea1b908f75514a'},
  {label:'Struggles',       key:'acfda2844d0b596f52ce91899dde7e6e4fd38370'},
  {label:'Softwares',       key:'1ae94f5f8fe79a6a2758337bb1a20fc403cacd68'},
  {label:'Spend',           key:'e10ada8a74aa70a16348bf7a4b4284981dad5d7a'},
  {label:'Use Case',        key:'c10eafd6c05529546e9a2c0c47201da22d9e9636'},
  {label:'Decision Makers', key:'4595486f60214eb50fb7505801099be717a52f31'},
  {label:'Budget',          key:'ccebf09951eb26465211998ecdfe5b7a30abef13'},
  {label:'Competitors',     key:'e3f3dad7e208d601384a087c9ff83de3f1c07370'},
  {label:'Objections',      key:'5bda8cb706195ea83dc54627b39c98df8496bc52'},
  {label:'Website',         key:'website'}
];
var FOUR_S = ['Size','Struggles','Softwares','Spend'];

var allDeals    = [];
var activeFields = [];
var starOnly    = false;
var selOwners   = [];
var selStages   = [];

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isEmpty(v){
  if(v===undefined||v===null||v==='')return true;
  if(typeof v==='string'&&v.trim()==='')return true;
  if(Array.isArray(v)&&v.length===0)return true;
  return false;
}
function isStar(d){return d.title&&d.title.indexOf('***')!==-1;}

function switchTab(tab){
  document.getElementById('panel-deals').style.display=tab==='deals'?'block':'none';
  document.getElementById('panel-leads').style.display=tab==='leads'?'block':'none';
  document.getElementById('tab-deals').classList.toggle('active',tab==='deals');
  document.getElementById('tab-leads').classList.toggle('active',tab==='leads');
}

/* ── Multi-select ────────────────────────────────────────────────── */
function initMultiSelect(id, options, isStage){
  var dd = document.getElementById(id+'-dropdown');
  options.forEach(function(opt){
    var val   = isStage ? opt.id : opt;
    var label = isStage ? opt.name : opt;
    var el = document.createElement('div');
    el.className = 'multi-option';
    el.dataset.val = val;
    el.innerHTML = '<span class="multi-checkbox"></span><span>'+esc(label)+'</span>';
    el.addEventListener('click', function(e){
      e.stopPropagation();
      toggleOption(id, val, isStage);
    });
    dd.appendChild(el);
  });
}

function toggleDropdown(id){
  var dd = document.getElementById(id+'-dropdown');
  dd.classList.toggle('hidden');
  document.getElementById(id).querySelector('.multi-select-trigger').classList.toggle('open', !dd.classList.contains('hidden'));
}

document.addEventListener('click', function(e){
  ['ms-owner','ms-stage'].forEach(function(id){
    var el = document.getElementById(id);
    if(el && !el.contains(e.target)){
      document.getElementById(id+'-dropdown').classList.add('hidden');
      el.querySelector('.multi-select-trigger').classList.remove('open');
    }
  });
});

function toggleOption(id, val, isStage){
  var arr = isStage ? selStages : selOwners;
  var idx = arr.indexOf(val);
  if(idx===-1){arr.push(val);}else{arr.splice(idx,1);}
  // sync checkboxes
  var dd = document.getElementById(id+'-dropdown');
  dd.querySelectorAll('.multi-option').forEach(function(el){
    var sel = arr.indexOf(el.dataset.val)!==-1;
    el.classList.toggle('selected', sel);
    el.querySelector('.multi-checkbox').textContent = sel ? '✓' : '';
  });
  // update label
  var labelEl = document.getElementById(id+'-label');
  if(arr.length===0){
    labelEl.textContent = isStage ? 'All stages' : 'All owners';
  } else {
    var names = isStage
      ? arr.map(function(v){return STAGES[v]||v;})
      : arr.slice();
    labelEl.textContent = names.join(', ');
  }
  if(allDeals.length) renderResults();
}

function toggleStarFilter(){
  starOnly = !starOnly;
  document.getElementById('star-toggle-btn').classList.toggle('active', starOnly);
  if(allDeals.length) renderResults();
}

function clearFilters(){
  selOwners=[];selStages=[];starOnly=false;activeFields=[];
  ['ms-owner','ms-stage'].forEach(function(id){
    var isStage = id==='ms-stage';
    document.getElementById(id+'-dropdown').querySelectorAll('.multi-option').forEach(function(el){
      el.classList.remove('selected');
      el.querySelector('.multi-checkbox').textContent='';
    });
    document.getElementById(id+'-label').textContent = isStage?'All stages':'All owners';
  });
  document.getElementById('star-toggle-btn').classList.remove('active');
  if(allDeals.length) renderResults();
}

function toggleFieldFilter(label){
  var idx = activeFields.indexOf(label);
  if(idx===-1){ activeFields.push(label); } else { activeFields.splice(idx,1); }
  renderResults();
}

/* ── Fetch ───────────────────────────────────────────────────────── */
var pieChart = null;
var PIE_COLORS = {Amy:'#40E8C0',Fady:'#C8C000',Matt:'#4A90C0',Myron:'#E07040',Merryn:'#C060A0',Other:'#507850'};

function ownerFirst(d){
  var name = d.owner_name||(d.user_id&&d.user_id.name)||'Unknown';
  var first = name.split(' ')[0];
  return KNOWN_OWNERS().indexOf(first)!==-1 ? first : 'Other';
}

function renderPie(deals){
  var canvas = document.getElementById('pie-chart');
  if(!canvas) return;
  var counts = {};
  deals.forEach(function(d){
    var o = ownerFirst(d);
    counts[o] = (counts[o]||0)+1;
  });
  var labels = Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];});
  var data   = labels.map(function(l){return counts[l];});
  var colors = labels.map(function(l){return PIE_COLORS[l]||'#507850';});

  if(pieChart){ pieChart.destroy(); pieChart=null; }
  if(!labels.length) return;

  pieChart = new Chart(canvas, {
    type: 'doughnut',
    data: { labels: labels, datasets:[{ data:data, backgroundColor:colors, borderWidth:0, hoverOffset:4 }] },
    options: {
      responsive:true, maintainAspectRatio:true,
      cutout:'62%',
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:function(ctx){ return ' '+ctx.label+': '+ctx.raw+' deals'; }
          },
          backgroundColor:'#072820',
          borderColor:'#186850',
          borderWidth:1,
          titleColor:'#D8FFE8',
          bodyColor:'#50B888',
          padding:10,
        }
      }
    }
  });

  var legend = document.getElementById('pie-legend');
  if(legend){
    legend.innerHTML = labels.map(function(l){
      return '<div class="pie-legend-item">'+
        '<span class="pie-legend-dot" style="background:'+PIE_COLORS[l]+'"></span>'+
        '<span>'+esc(l)+'</span>'+
        '<span style="margin-left:auto;color:var(--text)">'+counts[l]+'</span>'+
        '</div>';
    }).join('');
  }
}


async function loadDeals(){
  document.getElementById('pd-summary').innerHTML='';
  document.getElementById('pd-results').innerHTML=
    '<div class="state-block"><div class="loader">'+
    '<div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>'+
    '</div><p>Fetching deals\u2026</p></div>';
  try{
    allDeals=[];
    var start=0,more=true;
    while(more){
      var url='https://api.pipedrive.com/v1/deals?api_token='+PD_TOKEN+
        '&pipeline_id='+PD_PIPELINE+'&status=open&limit=500&start='+start;
      var res=await fetch(url);
      var data=await res.json();
      if(!data.success)throw new Error(data.error||'API error');
      allDeals=allDeals.concat(data.data||[]);
      more=!!(data.additional_data&&data.additional_data.pagination&&data.additional_data.pagination.more_items_in_collection);
      start+=500;
    }
    renderResults();
  }catch(err){
    document.getElementById('pd-results').innerHTML=
      '<div class="error-block"><strong>Something went wrong</strong>'+esc(err.message)+'</div>';
  }
}

/* ── Filter ──────────────────────────────────────────────────────── */
function KNOWN_OWNERS(){return ['Amy','Fady','Matt','Myron','Merryn'];}

function applyFilters(){
  return allDeals.filter(function(d){
    if(selOwners.length){
      var name=(d.owner_name||(d.user_id&&d.user_id.name)||'Unknown');
      var first=name.split(' ')[0];
      var matchKnown = selOwners.indexOf(first)!==-1;
      var matchOther = selOwners.indexOf('Other')!==-1 && KNOWN_OWNERS().indexOf(first)===-1;
      if(!matchKnown && !matchOther) return false;
    }
    if(selStages.length&&selStages.indexOf(String(d.stage_id))===-1)return false;
    if(starOnly&&!isStar(d))return false;
    return true;
  });
}

/* ── Render ──────────────────────────────────────────────────────── */
function renderResults(){
  if(!allDeals.length)return;
  var filtered = applyFilters();

  // Per-field counts across filtered
  var counts={};
  CHECKS.forEach(function(c){
    counts[c.label]=filtered.filter(function(d){return isEmpty(d[c.key]);}).length;
  });

  // Flagged = at least one empty field
  var flagged     = filtered.filter(function(d){return CHECKS.some(function(c){return isEmpty(d[c.key]);});});
  var flaggedStar = flagged.filter(isStar);

  var totalStar   = filtered.filter(isStar).length;

  // Field-filter narrowing
  var displayed = activeFields.length
    ? flagged.filter(function(d){
        return activeFields.some(function(lbl){
          var c=CHECKS.find(function(c){return c.label===lbl;});
          return c&&isEmpty(d[c.key]);
        });
      })
    : flagged;

  // Sort alphabetically
  displayed = displayed.slice().sort(function(a,b){
    return (a.title||'').localeCompare(b.title||'');
  });

  /* ── Summary block ── */
  var fieldCards='';
  CHECKS.forEach(function(c){
    var isAct=activeFields.indexOf(c.label)!==-1;
    fieldCards+=
      '<div class="field-stat'+(isAct?' active':'')+'" onclick="toggleFieldFilter(\''+c.label+'\')">'+
      '<div class="field-stat-num">'+counts[c.label]+'</div>'+
      '<div class="field-stat-label">'+esc(c.label)+'</div>'+
      '</div>';
  });

  document.getElementById('pd-summary').innerHTML=
    '<div class="summary-grid">'+
    '<div class="summary-outer">'+
      '<div class="summary-block">'+
        '<div class="summary-label">'+(activeFields.length?'Filtered: '+activeFields.map(esc).join(', '):'All deals — missing data')+'</div>'+
        '<div class="summary-big">'+(activeFields.length?displayed.length:flagged.length)+'</div>'+
        '<div class="summary-sub">of '+filtered.length+' in scope</div>'+
      '</div>'+
      '<div class="summary-divider"></div>'+
      '<div class="summary-block">'+
        '<div class="summary-label">STAR deals — missing data</div>'+
        '<div class="summary-big-star">'+(activeFields.length?displayed.filter(isStar).length:flaggedStar.length)+'</div>'+
        '<div class="summary-sub">of '+totalStar+' STAR deals</div>'+
      '</div>'+
    '</div>'+
    '<div class="summary-right">'+
      '<div class="summary-fields-grid">'+fieldCards+'</div>'+
    '</div>'+
    '<div class="pie-card">'+
      '<div class="pie-title">Missing data by owner</div>'+
      '<div class="pie-wrap"><canvas id="pie-chart"></canvas></div>'+
      '<div class="pie-legend" id="pie-legend"></div>'+
    '</div>'+
    '</div>';

  renderPie(displayed);

  /* ── Results list ── */
  var resultsEl=document.getElementById('pd-results');
  if(!displayed.length){
    resultsEl.innerHTML=
      '<div class="all-good-block">'+
      '<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">'+
      '<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>'+
      (activeFields.length?'No deals missing '+activeFields.map(esc).join(' or ')+'.':'All deals are complete.')+
      '</div>';
    return;
  }

  var out=
    '<div class="results-header">'+
    '<span class="results-count">'+displayed.length+' deal'+(displayed.length===1?'':'s')+'</span>'+
    (activeFields.length?'<button class="filter-clear" onclick="activeFields=[];renderResults()">Clear field filters</button>':'')+
    '</div>'+
'<div class="results-list">';

  displayed.forEach(function(d,i){
    var ownerName=d.owner_name||(d.user_id&&d.user_id.name)||'Unknown';
    var stageName=STAGES[d.stage_id]||('Stage '+d.stage_id);
    var star=isStar(d);
    var issues=CHECKS.filter(function(c){return isEmpty(d[c.key]);}).map(function(c){return c.label;});
    var displayTitle = star ? d.title.replace('***','').trim() : d.title;
    out+=
      '<div class="result-item'+(star?' is-star':'')+'" style="animation-delay:'+Math.min(i*12,400)+'ms">'+
      '<div class="result-head">'+
        '<span class="result-name">'+(star?'<span class="star-badge">&#9733;</span>':'')+esc(displayTitle)+'</span>'+
        '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
          '<span class="result-meta">'+esc(ownerName)+'</span>'+
          '<span class="stage-pill">'+esc(stageName)+'</span>'+
          '<a class="result-link" href="https://app.pipedrive.com/deal/'+d.id+'" target="_blank">\u2197 open</a>'+
        '</div>'+
      '</div>'+
      '<div class="missing-fields">';
    issues.forEach(function(lbl){
      out+='<span class="missing-pill"><span class="missing-dot"></span>'+esc(lbl)+'</span>';
    });
    out+='</div></div>';
  });
  out+='</div>';
  resultsEl.innerHTML=out;
}

(function init(){
  initMultiSelect('ms-owner', OWNER_OPTIONS, false);
  initMultiSelect('ms-stage', STAGE_OPTIONS, true);
  loadDeals();
})();
</script>
</body>
</html>
